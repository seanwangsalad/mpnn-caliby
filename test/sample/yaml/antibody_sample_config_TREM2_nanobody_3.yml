data:
  task: binder_motif
  dataset: ppi
  loader:
    num_workers: 4
    prefetch_factor: 10
    log_dir: ${experiment.checkpointer.dirpath}/..
interpolant:
  t_method: uniform
  alpha_t: 3.0
  min_t: 0.6
  twisting:
    use: false
  starting_at_hotspot_center: false
  rots:
    corrupt: true
    train_schedule: linear
    sample_schedule: exp
    exp_rate: 10
  trans:
    corrupt: true
    var_scale: 10
    train_schedule: linear
    sample_schedule: linear
  sampling:
    num_timesteps: 100
    do_sde: false
  self_condition: ${model.edge_features.self_condition}
experiment:
  debug: false
  novo_embedding_layers: false
  seed: 123
  num_devices: 1
  warm_start: null
  warm_start_cfg_override: false
  wandb:
    name: ${data.task}_${data.dataset}
    project: se3
    save_code: true
    mode: offline
    save_dir: results/binder_motif_ppi/
    dir: ${experiment.checkpointer.dirpath}/..
  checkpointer:
    dirpath: /home/seanwang/Desktop/pull/PPIFLOW/baffr/output/partial_flow/TREM2_nanobody_3
    save_top_k: -1
    mode: max
  pretrain_path: null
  dir: results/binder_motif_ppi/
  testing_model:
    ckpt_path: /home/seanwang/PPIFlow_sjw44/weights/nanobody.ckpt
    save_dir: /home/seanwang/Desktop/pull/PPIFLOW/baffr/output/partial_flow/TREM2_nanobody_3
  retry_Limit: 3
ppi_dataset:
  seed: 123
  train_csv_path: null
  val_csv_path: null
  val_csv_path1: unused
  define_hotspots: true
  motif_task_freq: 1.0
  binder_motif_task_freq: 1.0
  motif:
    binder_motif_mode: framework
    define_motif: false
  cache_num_res: 0
  samples_min_length: 50
  samples_max_length: 100
  samples_per_target: 1
  samples_batch_size: 1
  sample_original_binder_len: false
  sample_pdbname: null
  test_csv_path: /home/seanwang/Desktop/pull/PPIFLOW/baffr/output/partial_flow/TREM2_nanobody_3/input/TREM2_nanobody_3_input.csv
model:
  node_embed_size: 256
  edge_embed_size: 128
  symmetric: false
  use_gradient_checkpointing: false
  use_deepspeed_evo_attention: false
  node_features:
    c_s: ${model.node_embed_size}
    c_pos_emb: 128
    c_timestep_emb: 128
    c_aatype_emb: 128
    max_num_res: 2000
    timestep_int: 1000
    embed_chain: true
    embed_aatype: true
    n_aatype: 22
    task: binder_motif
  edge_features:
    single_bias_transition_n: 2
    c_s: ${model.node_embed_size}
    c_p: ${model.edge_embed_size}
    relpos_k: 64
    feat_dim: 64
    rel_pos_feat_dim: 64
    num_bins: 22
    pairwise_direction: true
    self_condition: true
    embed_chain: true
    embed_diffuse_mask: true
    embed_hotspot_mask: true
    embed_aatype: true
    task: binder_motif
  ipa:
    c_s: ${model.node_embed_size}
    c_z: ${model.edge_embed_size}
    c_hidden: 128
    no_heads: 8
    no_qk_points: 8
    no_v_points: 12
    seq_tfmr_num_heads: 4
    seq_tfmr_num_layers: 2
    num_blocks: 6
  pairformer:
    use: true
    c_s: ${model.node_embed_size}
    c_z: ${model.edge_embed_size}
    no_heads: 8
    num_blocks: 4
    c_hidden_pair_att: 16
    no_heads_pair: 4
  task: binder_motif
